name: Deploy TrendZY to AWS EC2

on:
  push:
    branches:
      - master
  workflow_dispatch: # This adds a manual "Run" button in GitHub just in case!

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # This is the magic permission that allows pushing to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./TrendZY
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trendzy-backend:latest

      - name: Build and push AI Worker
        uses: docker/build-push-action@v5
        with:
          context: ./trendzy-ai-worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/trendzy-ai-worker:latest

      - name: Deploy to EC2 Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/trendxee
            cd ~/trendxee
            
            # 📄 1. Dynamically construct the PRODUCTION docker-compose.yml
            cat > docker-compose.yml << 'COMPOSEEOF'
            version: '3.8'
            
            services:
              kafka:
                image: confluentinc/cp-kafka:7.6.1
                container_name: kafka
                hostname: kafka
                restart: always
                ports:
                  - "9092:9092"
                environment:
                  KAFKA_NODE_ID: 1
                  KAFKA_PROCESS_ROLES: 'broker,controller'
                  KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
                  KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
                  KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092'
                  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
                  KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
                  KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
                  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
                  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
                  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
                  CLUSTER_ID: '4L6g3pM-S6u3-vVn7916XQ'
                healthcheck:
                  test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
                  interval: 10s
                  timeout: 10s
                  retries: 10
            
              backend:
                image: ghcr.io/${{ github.repository_owner }}/trendzy-backend:latest
                container_name: trendzy_backend
                restart: always
                ports:
                  - "8080:8080"
                env_file:
                  - .env
                depends_on:
                  - kafka
            
              ai-worker:
                image: ghcr.io/${{ github.repository_owner }}/trendzy-ai-worker:latest
                container_name: trendzy_ai_worker
                restart: always
                env_file:
                  - .env
                depends_on:
                  - kafka
            COMPOSEEOF
            
            # 🔐 2. Dynamically construct the .env file
            cat > .env << 'ENVEOF'
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }}
            MONGO_URI=${{ secrets.MONGODB_URI }}
            
            KAFKA_BROKERS=kafka:29092
            KAFKA_BROKER=kafka:29092
            KAFKA_TOPIC=raw-signals-topic
            KAFKA_GROUP_ID=ai-trend-cluster-group
            KAFKA_AUTO_OFFSET_RESET=earliest
            
            BACKEND_PORT=8080
            FRONTEND_PORT=8081
            
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_MODEL=llama-3.3-70b-versatile
            LOG_LEVEL=INFO
            INGEST_AUTH_CODE=${{ secrets.INGEST_AUTH_CODE }}
            FRONTEND_URL=https://trendxee.com
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ENVEOF
            
            # 🐳 3. Pull and run the images
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker pull ghcr.io/${{ github.repository_owner }}/trendzy-backend:latest
            sudo docker pull ghcr.io/${{ github.repository_owner }}/trendzy-ai-worker:latest
            
            sudo docker-compose down
            sudo docker-compose up -d
            sudo docker image prune -f